function ZoomIn()
{
     DWGViewX.ZoomIn();
}
function ZoomOut()
{
	DWGViewX.ZoomOut();
}
function ZoomAll()
{
	DWGViewX.ZoomAll();
}
function HideToolbar()
{
    DWGViewX.ShowToobar = !DWGViewX.ShowToobar
}

function Pan()
{
	DWGViewX.PanByMouse();
}

function ZoomWindow()
{
	DWGViewX.ZoomRectByMouse();
}
function HideLayoutBar()
{
	DWGViewX.ShowLayoutBar = !DWGViewX.ShowLayoutBar;
}
function Background()
{
	DWGViewX.Background = DWGViewX.Background ==0? 7:0 
}
function Print()
{
	DWGViewX.Print();
}

</script>
